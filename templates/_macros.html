{% macro product_image(color, icon, size='h-40') %}
<div class="{{ size }} w-full rounded-xl flex items-center justify-center" style="background:{{ color }}22; background-image: radial-gradient(circle at 30% 20%, {{ color }}55, transparent 60%), linear-gradient(160deg, {{ color }}33, {{ color }}11);">
  <svg viewBox="0 0 100 100" class="w-2/5 h-2/5" fill="none" xmlns="http://www.w3.org/2000/svg">
    {% if icon == 'serum' %}
      <rect x="38" y="34" width="24" height="42" rx="6" fill="{{ color }}" fill-opacity="0.9"/>
      <rect x="42" y="14" width="16" height="22" rx="4" fill="#5C4A46"/>
      <circle cx="50" cy="10" r="6" fill="#3A2E2B"/>
      <rect x="46" y="46" width="8" height="4" rx="2" fill="#ffffff" fill-opacity="0.7"/>
    {% elif icon == 'jar' %}
      <rect x="26" y="38" width="48" height="38" rx="10" fill="{{ color }}" fill-opacity="0.95"/>
      <rect x="24" y="30" width="52" height="12" rx="6" fill="#ffffff" fill-opacity="0.85"/>
      <rect x="38" y="52" width="24" height="6" rx="3" fill="#ffffff" fill-opacity="0.5"/>
    {% elif icon == 'lipstick' %}
      <rect x="42" y="46" width="16" height="34" rx="4" fill="#2B2B2B"/>
      <rect x="42" y="26" width="16" height="22" rx="3" fill="{{ color }}" fill-opacity="0.95"/>
      <path d="M42 26 L50 14 L58 26 Z" fill="{{ color }}"/>
    {% elif icon == 'gel' %}
      <rect x="28" y="30" width="44" height="46" rx="16" fill="{{ color }}" fill-opacity="0.9"/>
      <rect x="38" y="20" width="24" height="14" rx="6" fill="#ffffff" fill-opacity="0.8"/>
    {% elif icon == 'palette' %}
      <rect x="20" y="34" width="60" height="34" rx="8" fill="{{ color }}" fill-opacity="0.9"/>
      <circle cx="34" cy="51" r="7" fill="#ffffff" fill-opacity="0.7"/>
      <circle cx="50" cy="51" r="7" fill="#ffffff" fill-opacity="0.55"/>
      <circle cx="66" cy="51" r="7" fill="#ffffff" fill-opacity="0.4"/>
    {% else %}
      <rect x="30" y="30" width="40" height="40" rx="8" fill="{{ color }}"/>
    {% endif %}
  </svg>
</div>
{% endmacro %}

{% macro stock_badge(stock) %}
  {% if stock > 0 %}
    <span class="text-xs font-medium text-emerald-600">Stok: Tersedia</span>
  {% else %}
    <span class="text-xs font-medium text-red-500">Stok: Habis</span>
  {% endif %}
{% endmacro %}
